<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Счётчик отжиманий</title>
  <style>
    /* Глобальные стили */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: linear-gradient(145deg, #1e2b3a, #0f1923);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #e8edf3;
    }
    .container {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 60px 60px 40px 40px;
      padding: 40px 30px 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: all 0.2s;
    }

    /* Шапка */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .settings-toggle {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .settings-toggle:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* Центральный счётчик */
    .main-counter {
      text-align: center;
      margin: 10px 0 20px;
    }
    .big-number {
      font-size: clamp(3.8rem, 16vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    .big-number .total {
      color: #8896a8;
      -webkit-text-fill-color: #8896a8;
      font-weight: 500;
    }
    .sub-label {
      font-size: 1.1rem;
      color: #9aa9b9;
      margin-top: -8px;
      letter-spacing: 1px;
    }
    .progress-wrap {
      margin: 20px 0 12px;
      height: 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f6d365, #fda085);
      border-radius: 40px;
      transition: width 0.4s ease;
    }

    /* Таймер */
    .timer-block {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 18px 0 22px;
      font-size: 1.2rem;
      font-weight: 400;
      color: #bcc9d6;
    }
    .timer-block span {
      background: rgba(0, 0, 0, 0.2);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
    }
    .timer-block .num {
      font-weight: 600;
      color: #f6d365;
      margin-right: 4px;
    }
    .timer-block .label {
      font-size: 0.85rem;
      color: #8f9eb0;
      margin-left: 2px;
    }
    .status-message {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: #fda085;
      margin: 6px 0 16px;
    }

    /* Форма добавления */
    .add-form {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin: 25px 0 30px;
    }
    .add-form input {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 40px;
      padding: 14px 22px;
      width: 140px;
      font-size: 1.1rem;
      color: #fff;
      outline: none;
      transition: 0.2s;
      text-align: center;
    }
    .add-form input:focus {
      border-color: #f6d365;
      background: rgba(255, 255, 255, 0.1);
    }
    .add-form input::placeholder {
      color: #6f7f91;
    }
    .add-form button {
      background: linear-gradient(135deg, #f6d365, #fda085);
      border: none;
      border-radius: 40px;
      padding: 14px 34px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a2532;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 14px rgba(253, 160, 133, 0.25);
      letter-spacing: 0.3px;
    }
    .add-form button:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 20px rgba(253, 160, 133, 0.35);
    }
    .add-form button:active {
      transform: scale(0.97);
    }

    /* Список подходов */
    .approaches-section {
      margin-top: 12px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 1.2rem;
      font-weight: 500;
      color: #d0dceb;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .section-title .count-badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      color: #b0c0d0;
    }
    .approach-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .approach-list::-webkit-scrollbar {
      width: 4px;
    }
    .approach-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }
    .approach-list::-webkit-scrollbar-thumb {
      background: #f6d365;
      border-radius: 10px;
    }
    .approach-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      transition: 0.15s;
    }
    .approach-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }
    .approach-item .number {
      font-weight: 500;
      color: #bcc9d6;
      min-width: 40px;
    }
    .approach-item .count {
      font-weight: 600;
      font-size: 1.1rem;
      color: #f6d365;
    }
    .approach-item .time {
      font-size: 0.85rem;
      color: #7f8fa3;
    }
    .approach-item .delete-btn {
      background: none;
      border: none;
      color: #6f7f91;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.2s;
      padding: 0 6px;
    }
    .approach-item .delete-btn:hover {
      color: #fda085;
    }

    /* Настройки (скрыты по умолчанию) */
    .settings-panel {
      margin-top: 30px;
      padding: 22px 20px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: none;
      flex-wrap: wrap;
      align-items: end;
      gap: 20px 30px;
    }
    .settings-panel.open {
      display: flex;
    }
    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 160px;
    }
    .settings-group label {
      font-size: 0.85rem;
      color: #a0b1c4;
      letter-spacing: 0.3px;
    }
    .settings-group input {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 12px 18px;
      font-size: 1rem;
      color: #fff;
      outline: none;
      transition: 0.2s;
    }
    .settings-group input:focus {
      border-color: #f6d365;
      background: rgba(255, 255, 255, 0.1);
    }
    .settings-group input[type="date"] {
      color-scheme: dark;
    }
    .settings-save-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 40px;
      padding: 12px 28px;
      color: #d0dceb;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      flex: 0 0 auto;
    }
    .settings-save-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* Адаптив */
    @media (max-width: 500px) {
      .container {
        padding: 24px 16px 28px;
        border-radius: 40px;
      }
      .header h1 {
        font-size: 1.4rem;
      }
      .timer-block {
        font-size: 1rem;
        gap: 10px;
      }
      .timer-block span {
        padding: 6px 14px;
      }
      .add-form input {
        width: 100px;
        padding: 12px 16px;
      }
      .add-form button {
        padding: 12px 24px;
      }
      .approach-item {
        padding: 10px 14px;
        flex-wrap: wrap;
        gap: 6px;
      }
      .approach-item .time {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Шапка -->
  <div class="header">
    <h1>💪 Отжимания</h1>
    <button class="settings-toggle" id="settingsToggle">⚙️ Настройки</button>
  </div>

  <!-- Главный счётчик -->
  <div class="main-counter">
    <div class="big-number" id="mainDisplay">
      0 <span class="total">из 0</span>
    </div>
    <div class="sub-label">выполнено</div>
  </div>

  <!-- Прогресс -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- Таймер и статус -->
  <div class="timer-block" id="timerBlock">
    <span><span class="num" id="daysLeft">0</span><span class="label">дн</span></span>
    <span><span class="num" id="hoursLeft">0</span><span class="label">ч</span></span>
    <span><span class="num" id="minutesLeft">0</span><span class="label">мин</span></span>
  </div>
  <div class="status-message" id="statusMessage"></div>

  <!-- Форма добавления -->
  <div class="add-form">
    <input type="number" id="approachInput" placeholder="Кол-во" min="1" value="10" />
    <button id="addBtn">➕ Добавить подход</button>
  </div>

  <!-- Список подходов -->
  <div class="approaches-section">
    <div class="section-title">
      <span>📋 Подходы</span>
      <span class="count-badge" id="approachCount">0</span>
    </div>
    <div class="approach-list" id="approachList">
      <!-- сюда будут добавляться элементы -->
    </div>
  </div>

  <!-- Панель настроек -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-group">
      <label for="goalInput">Целевое количество</label>
      <input type="number" id="goalInput" min="1" value="1000" />
    </div>
    <div class="settings-group">
      <label for="endDateInput">Дата окончания</label>
      <input type="date" id="endDateInput" />
    </div>
    <button class="settings-save-btn" id="saveSettingsBtn">Сохранить</button>
  </div>
</div>

<script>
  (function() {
    // ----- Хранилище -----
    const STORAGE_KEY = 'pushup_challenge_data';

    function getDefaultData() {
      const now = new Date();
      const end = new Date(now);
      end.setDate(end.getDate() + 30); // по умолчанию 30 дней
      return {
        approaches: [],          // массив { count, timestamp }
        goal: 1000,
        endDate: end.toISOString().split('T')[0] // 'YYYY-MM-DD'
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultData();
        const data = JSON.parse(raw);
        // Валидация
        if (!data.approaches || !Array.isArray(data.approaches)) data.approaches = [];
        if (!data.goal || typeof data.goal !== 'number' || data.goal < 1) data.goal = 1000;
        if (!data.endDate) {
          const now = new Date();
          const end = new Date(now);
          end.setDate(end.getDate() + 30);
          data.endDate = end.toISOString().split('T')[0];
        }
        return data;
      } catch (e) {
        return getDefaultData();
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ----- Глобальное состояние -----
    let data = loadData();
    let timerInterval = null;

    // ----- DOM-элементы -----
    const mainDisplay = document.getElementById('mainDisplay');
    const progressBar = document.getElementById('progressBar');
    const daysLeftEl = document.getElementById('daysLeft');
    const hoursLeftEl = document.getElementById('hoursLeft');
    const minutesLeftEl = document.getElementById('minutesLeft');
    const statusMessage = document.getElementById('statusMessage');
    const approachList = document.getElementById('approachList');
    const approachCount = document.getElementById('approachCount');
    const approachInput = document.getElementById('approachInput');
    const addBtn = document.getElementById('addBtn');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const goalInput = document.getElementById('goalInput');
    const endDateInput = document.getElementById('endDateInput');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');

    // ----- Вспомогательные функции -----
    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getTotal() {
      return data.approaches.reduce((sum, item) => sum + item.count, 0);
    }

    function getRemaining() {
      const total = getTotal();
      return Math.max(0, data.goal - total);
    }

    function getTimeLeft() {
      const end = new Date(data.endDate + 'T23:59:59');
      const now = new Date();
      const diff = end - now;
      if (diff <= 0) return { days: 0, hours: 0, minutes: 0, finished: true };
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      return { days, hours, minutes, finished: false };
    }

    // ----- Рендеринг -----
    function render() {
      const total = getTotal();
      const goal = data.goal;
      const remaining = getRemaining();
      const progress = goal > 0 ? Math.min(100, (total / goal) * 100) : 0;

      // Главный счётчик
      mainDisplay.innerHTML = `${total} <span class="total">из ${goal}</span>`;

      // Прогресс
      progressBar.style.width = `${progress}%`;

      // Время
      const time = getTimeLeft();
      daysLeftEl.textContent = time.days;
      hoursLeftEl.textContent = time.hours;
      minutesLeftEl.textContent = time.minutes;

      // Статус
      if (time.finished) {
        statusMessage.textContent = '⏰ Челлендж завершён!';
        statusMessage.style.color = '#fda085';
      } else if (remaining <= 0) {
        statusMessage.textContent = '🎉 Цель достигнута! Поздравляем!';
        statusMessage.style.color = '#f6d365';
      } else {
        statusMessage.textContent = `Осталось ${remaining} отжиманий до цели`;
        statusMessage.style.color = '#bcc9d6';
      }

      // Список подходов
      renderApproaches();

      // Счётчик подходов
      approachCount.textContent = data.approaches.length;

      // Настройки (синхронизация полей)
      goalInput.value = goal;
      endDateInput.value = data.endDate;
    }

    function renderApproaches() {
      approachList.innerHTML = '';
      if (data.approaches.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'approach-item';
        empty.style.justifyContent = 'center';
        empty.style.color = '#6f7f91';
        empty.textContent = 'Нет подходов. Добавьте первый!';
        approachList.appendChild(empty);
        return;
      }
      // Показываем в обратном порядке (сначала новые)
      const reversed = [...data.approaches].reverse();
      reversed.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'approach-item';

        const numSpan = document.createElement('span');
        numSpan.className = 'number';
        numSpan.textContent = `#${data.approaches.length - index}`;

        const countSpan = document.createElement('span');
        countSpan.className = 'count';
        countSpan.textContent = `${item.count} отж.`;

        const timeSpan = document.createElement('span');
        timeSpan.className = 'time';
        timeSpan.textContent = formatDate(item.timestamp);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.title = 'Удалить подход';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = data.approaches.indexOf(item);
          if (idx !== -1) {
            data.approaches.splice(idx, 1);
            saveData(data);
            render();
          }
        });

        div.appendChild(numSpan);
        div.appendChild(countSpan);
        div.appendChild(timeSpan);
        div.appendChild(deleteBtn);
        approachList.appendChild(div);
      });
    }

    // ----- Добавление подхода -----
    function addApproach(count) {
      if (!count || count < 1) {
        alert('Введите корректное количество (≥ 1)');
        return false;
      }
      const now = new Date().getTime();
      data.approaches.push({ count, timestamp: now });
      saveData(data);
      render();
      // Прокрутка списка вниз (к новым)
      approachList.scrollTop = 0;
      return true;
    }

    // ----- Настройки -----
    function saveSettings() {
      let newGoal = parseInt(goalInput.value, 10);
      if (isNaN(newGoal) || newGoal < 1) {
        alert('Цель должна быть числом ≥ 1');
        return;
      }
      const newEndDate = endDateInput.value;
      if (!newEndDate) {
        alert('Выберите дату окончания');
        return;
      }
      data.goal = newGoal;
      data.endDate = newEndDate;
      saveData(data);
      render();
      // Закрываем панель
      settingsPanel.classList.remove('open');
      settingsToggle.textContent = '⚙️ Настройки';
    }

    // ----- Таймер обновления -----
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        render(); // обновляем время и статус
      }, 60000); // каждую минуту
      // Сразу рендерим
      render();
    }

    // ----- Инициализация -----
    function init() {
      // Заполняем поля настроек
      goalInput.value = data.goal;
      endDateInput.value = data.endDate;

      // События
      addBtn.addEventListener('click', () => {
        const val = parseInt(approachInput.value, 10);
        if (addApproach(val)) {
          approachInput.value = '';
          approachInput.focus();
        }
      });

      approachInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          addBtn.click();
        }
      });

      settingsToggle.addEventListener('click', () => {
        const isOpen = settingsPanel.classList.toggle('open');
        settingsToggle.textContent = isOpen ? '✕ Закрыть' : '⚙️ Настройки';
        if (isOpen) {
          goalInput.value = data.goal;
          endDateInput.value = data.endDate;
        }
      });

      saveSettingsBtn.addEventListener('click', saveSettings);

      // Закрыть панель по Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && settingsPanel.classList.contains('open')) {
          settingsPanel.classList.remove('open');
          settingsToggle.textContent = '⚙️ Настройки';
        }
      });

      // Начальный рендер
      render();
      startTimer();
    }

    init();
  })();
</script>
</body>
</html>
